name: Release

# Publishes the package to NuGet when a GitHub Release is published.
# Tag the release "v1.2.3" — the version is taken from the tag.
# Requires a repository secret named NUGET_API_KEY (Settings → Secrets and variables → Actions).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build backoffice client
        working-directory: ContentNodeEditorLock/Client
        run: |
          npm ci
          npm run build

      - name: Pack
        run: >
          dotnet pack ContentNodeEditorLock/Knowit.Umbraco.EditorLock.csproj
          -c Release
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
